<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대학생 생존 시뮬레이터</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: #0f0f0f;
            color: #e4e4e7;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 0 20px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #71717a;
            font-size: 0.95rem;
        }

        .dashboard {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 16px;
            padding: 30px;
            margin: 30px 0;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .survival-score {
            text-align: center;
            margin-bottom: 30px;
        }

        .survival-score h2 {
            font-size: 1.2rem;
            color: #a1a1aa;
            margin-bottom: 10px;
        }

        .score-display {
            font-size: 4rem;
            font-weight: 700;
            margin: 10px 0;
        }

        .score-green { color: #22c55e; }
        .score-yellow { color: #eab308; }
        .score-red { color: #ef4444; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .stat-card {
            background: #09090b;
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: #667eea;
            transform: translateY(-2px);
        }

        .stat-label {
            color: #71717a;
            font-size: 0.85rem;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.3rem;
            font-weight: 600;
        }

        .nav-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }

        .nav-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            padding: 40px 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            color: white;
            text-align: left;
        }

        .nav-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .nav-card h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .nav-card p {
            opacity: 0.9;
            font-size: 0.9rem;
        }

        .screen {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .back-button {
            background: #27272a;
            color: #e4e4e7;
            border: 1px solid #3f3f46;
            border-radius: 8px;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-bottom: 20px;
            transition: all 0.2s ease;
        }

        .back-button:hover {
            background: #3f3f46;
        }

        .section-title {
            font-size: 2rem;
            margin-bottom: 30px;
            color: #e4e4e7;
        }

        .input-group {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 15px;
            margin-bottom: 15px;
            align-items: end;
        }

        .form-row.task-row {
            grid-template-columns: 1fr 1fr 1fr auto;
        }

        .form-field {
            display: flex;
            flex-direction: column;
        }

        label {
            color: #a1a1aa;
            font-size: 0.85rem;
            margin-bottom: 8px;
        }

        input, select {
            background: #09090b;
            border: 1px solid #27272a;
            border-radius: 8px;
            padding: 12px 15px;
            color: #e4e4e7;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-large {
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            margin-top: 20px;
        }

        .item-list {
            margin: 20px 0;
        }

        .item {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }

        .item:hover {
            border-color: #3f3f46;
        }

        .item-info h4 {
            margin-bottom: 5px;
            font-size: 1.1rem;
        }

        .item-info p {
            color: #71717a;
            font-size: 0.85rem;
        }

        .delete-btn {
            background: #3f3f46;
            padding: 8px 16px;
            font-size: 0.85rem;
        }

        .delete-btn:hover {
            background: #ef4444;
        }

        .result-section {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 30px;
            margin-top: 30px;
        }

        .result-card {
            background: #09090b;
            border-left: 4px solid #667eea;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .result-card h4 {
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .result-card p {
            color: #a1a1aa;
            margin: 5px 0;
        }

        .result-card.urgent {
            border-left-color: #ef4444;
        }

        .result-card.rest {
            border-left-color: #22c55e;
        }

        .result-card.focus {
            border-left-color: #eab308;
        }

        .condition-result {
            text-align: center;
            padding: 40px;
        }

        .condition-emoji {
            font-size: 5rem;
            margin-bottom: 20px;
        }

        .condition-message {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .condition-detail {
            color: #71717a;
            font-size: 1rem;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-right: 8px;
        }

        .badge-easy { background: #22c55e; color: #000; }
        .badge-normal { background: #eab308; color: #000; }
        .badge-hard { background: #ef4444; color: #fff; }
        .badge-urgent { background: #ef4444; color: #fff; }

        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            .form-row, .form-row.task-row {
                grid-template-columns: 1fr;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎓 대학생 생존 시뮬레이터</h1>
            <p class="subtitle">과연 당신은 이번 학기를 살아남을 수 있을까요?</p>
        </header>

        <div id="home" class="screen active">
            <div class="dashboard">
                <div class="survival-score">
                    <h2>생존 가능성</h2>
                    <div class="score-display" id="survivalScore">--%</div>
                </div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">시험 압박도</div>
                        <div class="stat-value" id="examPressure">-</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">과제 압박도</div>
                        <div class="stat-value" id="taskPressure">-</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">컨디션 상태</div>
                        <div class="stat-value" id="conditionStatus">-</div>
                    </div>
                </div>
            </div>

            <div class="nav-cards">
                <button class="nav-card" onclick="showScreen('exam')">
                    <h3>📚 시험 플래너</h3>
                    <p>시험 일정을 입력하고 공부 계획을 세워보세요</p>
                </button>
                <button class="nav-card" onclick="showScreen('task')">
                    <h3>📝 과제 플래너</h3>
                    <p>마감일과 난이도로 우선순위를 정해드립니다</p>
                </button>
                <button class="nav-card" onclick="showScreen('condition')">
                    <h3>💤 컨디션 체크</h3>
                    <p>오늘의 수면과 카페인 상태를 체크하세요</p>
                </button>
            </div>
        </div>

        <div id="exam" class="screen">
            <button class="back-button" onclick="showScreen('home')">← 홈으로</button>
            <h2 class="section-title">📚 시험 플래너</h2>
            
            <div class="input-group">
                <div class="form-row">
                    <div class="form-field">
                        <label>과목명</label>
                        <input type="text" id="examSubject" placeholder="예: 프로그래밍기초">
                    </div>
                    <div class="form-field">
                        <label>시험 날짜</label>
                        <input type="date" id="examDate">
                    </div>
                    <div class="form-field">
                        <label>시험 시간</label>
                        <input type="time" id="examTime">
                    </div>
                    <button onclick="addExam()">추가</button>
                </div>
            </div>

            <div class="item-list" id="examList"></div>

            <button class="btn-large" onclick="generateStudyPlan()">📅 공부 플랜 생성</button>

            <div id="studyPlanResult"></div>
        </div>

        <div id="task" class="screen">
            <button class="back-button" onclick="showScreen('home')">← 홈으로</button>
            <h2 class="section-title">📝 과제 플래너</h2>
            
            <div class="input-group">
                <div class="form-row task-row">
                    <div class="form-field">
                        <label>과제명</label>
                        <input type="text" id="taskName" placeholder="예: 웹페이지 만들기">
                    </div>
                    <div class="form-field">
                        <label>마감일</label>
                        <input type="date" id="taskDeadline">
                    </div>
                    <div class="form-field">
                        <label>난이도</label>
                        <select id="taskDifficulty">
                            <option value="easy">쉬움</option>
                            <option value="normal">보통</option>
                            <option value="hard">헬과제</option>
                        </select>
                    </div>
                    <button onclick="addTask()">추가</button>
                </div>
            </div>

            <div class="item-list" id="taskList"></div>

            <button class="btn-large" onclick="generateTaskSchedule()">🔥 일정 생성</button>

            <div id="taskScheduleResult"></div>
        </div>

        <div id="condition" class="screen">
            <button class="back-button" onclick="showScreen('home')">← 홈으로</button>
            <h2 class="section-title">💤 컨디션 체크</h2>
            
            <div class="input-group">
                <div class="form-field">
                    <label>오늘 수면 시간 (시간)</label>
                    <input type="number" id="sleepHours" placeholder="예: 6" min="0" max="24" step="0.5">
                </div>
                <div class="form-field">
                    <label>오늘 카페인 섭취량 (잔)</label>
                    <input type="number" id="caffeineCount" placeholder="예: 3" min="0" max="20">
                </div>
                <button class="btn-large" onclick="checkCondition()">✅ 체크하기</button>
            </div>

            <div id="conditionResult"></div>
        </div>
    </div>

    <script>
        let exams = [];
        let tasks = [];
        let conditionScore = 0;

        function showScreen(screenName) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenName).classList.add('active');
            updateDashboard();
        }

        function addExam() {
            const subject = document.getElementById('examSubject').value.trim();
            const date = document.getElementById('examDate').value;
            const time = document.getElementById('examTime').value;
            
            if (!subject || !date || !time) {
                alert('과목명, 시험 날짜, 시간을 모두 입력하세요!');
                return;
            }

            exams.push({ subject, date, time });
            document.getElementById('examSubject').value = '';
            document.getElementById('examDate').value = '';
            document.getElementById('examTime').value = '';
            renderExamList();
            updateDashboard();
        }

        function renderExamList() {
            const list = document.getElementById('examList');
            if (exams.length === 0) {
                list.innerHTML = '';
                return;
            }

            list.innerHTML = exams.map((exam, index) => `
                <div class="item">
                    <div class="item-info">
                        <h4>${exam.subject}</h4>
                        <p>시험일: ${exam.date} ${exam.time} (D-${getDday(exam.date)})</p>
                    </div>
                    <button class="delete-btn" onclick="deleteExam(${index})">삭제</button>
                </div>
            `).join('');
        }

        function deleteExam(index) {
            exams.splice(index, 1);
            renderExamList();
            updateDashboard();
        }

        function getDday(dateString) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const target = new Date(dateString);
            const diff = Math.ceil((target - today) / (1000 * 60 * 60 * 24));
            return diff;
        }

        function generateStudyPlan() {
            if (exams.length === 0) {
                alert('시험을 먼저 추가하세요!');
                return;
            }

            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            const sortedExams = [...exams].sort((a, b) => new Date(a.date) - new Date(b.date));
            const lastExamDate = new Date(sortedExams[sortedExams.length - 1].date);
            const totalDays = Math.ceil((lastExamDate - today) / (1000 * 60 * 60 * 24));

            if (totalDays < 0) {
                alert('모든 시험이 이미 지났습니다!');
                return;
            }

            const examData = sortedExams.map(exam => ({
                ...exam,
                dday: getDday(exam.date),
                studyPool: []
            }));

            examData.forEach(exam => {
                const studyDays = Math.max(3, Math.floor(exam.dday * 0.65));
                for (let i = 0; i < studyDays; i++) {
                    exam.studyPool.push(exam.subject);
                }
            });

            const schedule = {};
            let rotationIndex = 0;

            for (let day = 0; day <= totalDays; day++) {
                const currentDate = new Date(today);
                currentDate.setDate(currentDate.getDate() + day);

                const urgentExams = examData.filter(e => e.dday - day <= 7 && e.dday - day > 0);
                const normalExams = examData.filter(e => e.dday - day > 7);
                const availableExams = examData.filter(e => e.studyPool.length > 0);

                if (availableExams.length === 0) continue;

                let selectedSubjects = [];

                if (urgentExams.length > 0) {
                    const urgentSubject = urgentExams[0].subject;
                    selectedSubjects.push(urgentSubject);

                    if (normalExams.length > 0 && Math.random() > 0.3) {
                        const normalSubject = normalExams[rotationIndex % normalExams.length].subject;
                        selectedSubjects.push(normalSubject);
                        rotationIndex++;
                    } else if (urgentExams.length > 1) {
                        selectedSubjects.push(urgentExams[1].subject);
                    }
                } else {
                    if (availableExams.length >= 2) {
                        selectedSubjects.push(availableExams[rotationIndex % availableExams.length].subject);
                        selectedSubjects.push(availableExams[(rotationIndex + 1) % availableExams.length].subject);
                        rotationIndex++;
                    } else {
                        selectedSubjects.push(availableExams[0].subject);
                    }
                }

                selectedSubjects = [...new Set(selectedSubjects)];

                selectedSubjects.forEach(subject => {
                    const exam = examData.find(e => e.subject === subject);
                    if (exam && exam.studyPool.length > 0) {
                        exam.studyPool.pop();
                    }
                });

                if (day % 5 === 4 && urgentExams.length === 0) {
                    schedule[day] = { subjects: ['휴식'], isRest: true };
                } else {
                    schedule[day] = { subjects: selectedSubjects, isRest: false };
                }
            }

            const planList = [];
            for (let day = 0; day <= totalDays; day++) {
                if (!schedule[day]) continue;

                const currentDate = new Date(today);
                currentDate.setDate(currentDate.getDate() + day);
                const dateStr = `${currentDate.getMonth() + 1}/${currentDate.getDate()}`;
                const dayOfWeek = ['일', '월', '화', '수', '목', '금', '토'][currentDate.getDay()];

                const urgentCheck = examData.some(e => 
                    schedule[day].subjects.includes(e.subject) && e.dday - day <= 7 && e.dday - day > 0
                );

                planList.push({
                    date: dateStr,
                    day: dayOfWeek,
                    subjects: schedule[day].subjects,
                    isRest: schedule[day].isRest,
                    isFocus: urgentCheck
                });
            }

            renderStudyPlan(planList);
        }

        function renderStudyPlan(plan) {
            const result = document.getElementById('studyPlanResult');
            result.innerHTML = `
                <div class="result-section">
                    <h3 style="margin-bottom: 20px;">📅 추천 공부 플랜 (균형 로테이션)</h3>
                    ${plan.map(day => `
                        <div class="result-card ${day.isRest ? 'rest' : day.isFocus ? 'focus' : ''}">
                            <h4>${day.date} (${day.day})</h4>
                            ${day.subjects.map(s => `<p>${s}${s === '휴식' ? ' 🛌' : ' 📖'}${day.isFocus && s !== '휴식' ? ' 🔥' : ''}</p>`).join('')}
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function addTask() {
            const name = document.getElementById('taskName').value.trim();
            const deadline = document.getElementById('taskDeadline').value;
            const difficulty = document.getElementById('taskDifficulty').value;

            if (!name || !deadline) {
                alert('과제명과 마감일을 입력하세요!');
                return;
            }

            tasks.push({ name, deadline, difficulty });
            document.getElementById('taskName').value = '';
            document.getElementById('taskDeadline').value = '';
            renderTaskList();
            updateDashboard();
        }

        function renderTaskList() {
            const list = document.getElementById('taskList');
            if (tasks.length === 0) {
                list.innerHTML = '';
                return;
            }

            const difficultyLabel = {
                easy: '<span class="badge badge-easy">쉬움</span>',
                normal: '<span class="badge badge-normal">보통</span>',
                hard: '<span class="badge badge-hard">헬과제</span>'
            };

            list.innerHTML = tasks.map((task, index) => `
                <div class="item">
                    <div class="item-info">
                        <h4>${task.name}</h4>
                        <p>${difficultyLabel[task.difficulty]} 마감: ${task.deadline} (D-${getDday(task.deadline)})</p>
                    </div>
                    <button class="delete-btn" onclick="deleteTask(${index})">삭제</button>
                </div>
            `).join('');
        }

        function deleteTask(index) {
            tasks.splice(index, 1);
            renderTaskList();
            updateDashboard();
        }

        function generateTaskSchedule() {
            if (tasks.length === 0) {
                alert('과제를 먼저 추가하세요!');
                return;
            }

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const taskData = tasks.map(task => {
                const dday = getDday(task.deadline);
                const diffDays = { easy: 1, normal: 3, hard: 5 }[task.difficulty];
                const startDay = Math.max(0, dday - diffDays);
                
                return {
                    ...task,
                    dday,
                    startDay,
                    diffDays,
                    workPool: []
                };
            });

            taskData.forEach(task => {
                for (let i = 0; i < task.diffDays; i++) {
                    task.workPool.push(task.name);
                }
            });

            taskData.sort((a, b) => a.startDay - b.startDay);

            const sortedTasks = [...tasks].sort((a, b) => getDday(a.deadline) - getDday(b.deadline));
            const lastTaskDeadline = getDday(sortedTasks[sortedTasks.length - 1].deadline);
            const totalDays = Math.max(0, lastTaskDeadline - 1);

            const schedule = {};
            let rotationIndex = 0;

            for (let day = 0; day <= totalDays; day++) {
                const urgentTasks = taskData.filter(t => 
                    t.dday - day <= 2 && 
                    t.dday - day >= 1 &&
                    t.workPool.length > 0
                );

                const activeTasks = taskData.filter(t => 
                    t.dday - day > 2 && 
                    day >= t.startDay && 
                    day < t.dday &&
                    t.workPool.length > 0
                );

                let selectedTasks = [];

                if (urgentTasks.length > 0) {
                    selectedTasks.push(urgentTasks[0].name);
                    urgentTasks[0].workPool.pop();
                } else if (activeTasks.length > 0) {
                    const selected = activeTasks[rotationIndex % activeTasks.length];
                    selectedTasks.push(selected.name);
                    selected.workPool.pop();
                    rotationIndex++;
                }

                if (selectedTasks.length > 0) {
                    const isUrgent = urgentTasks.length > 0;
                    schedule[day] = { tasks: selectedTasks, urgent: isUrgent };
                }
            }

            const planList = [];
            for (let day = 0; day <= totalDays; day++) {
                if (!schedule[day]) continue;

                const currentDate = new Date(today);
                currentDate.setDate(currentDate.getDate() + day);
                const dateStr = `${currentDate.getMonth() + 1}/${currentDate.getDate()}`;
                const dayOfWeek = ['일', '월', '화', '수', '목', '금', '토'][currentDate.getDay()];

                planList.push({
                    date: dateStr,
                    day: dayOfWeek,
                    tasks: schedule[day].tasks,
                    urgent: schedule[day].urgent
                });
            }

            renderTaskSchedule(planList);
        }

        function renderTaskSchedule(planList) {
            const result = document.getElementById('taskScheduleResult');
            result.innerHTML = `
                <div class="result-section">
                    <h3 style="margin-bottom: 20px;">🔥 과제 일정표</h3>
                    ${planList.map(day => `
                        <div class="result-card ${day.urgent ? 'urgent' : ''}">
                            <h4>${day.date} (${day.day})</h4>
                            ${day.tasks.map(t => `<p>✏️ ${t}${day.urgent ? ' 🔥' : ''}</p>`).join('')}
                            ${day.urgent ? '<p style="margin-top: 10px; color: #ef4444;">⚠️ 마감 임박!</p>' : ''}
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function checkCondition() {
            const sleep = parseFloat(document.getElementById('sleepHours').value);
            const caffeine = parseInt(document.getElementById('caffeineCount').value);

            if (isNaN(sleep) || isNaN(caffeine)) {
                alert('수면 시간과 카페인 섭취량을 입력하세요!');
                return;
            }

            let score = 0;
            let emoji = '😐';
            let message = '보통';
            let detail = '';

            if (sleep >= 8) {
                score += 40;
                detail += '완벽한 수면! 👍 ';
            } else if (sleep >= 7) {
                score += 25;
                detail += '양호한 수면 😊 ';
            } else if (sleep >= 6) {
                score += 5;
                detail += '수면 부족 주의 ⚠️ ';
            } else if (sleep >= 4) {
                score -= 20;
                detail += '인간다운 수면 필요 🛌 ';
            } else {
                score -= 40;
                detail += '좀비 모드 돌입 🧟 ';
            }

            if (caffeine === 0) {
                score += 5;
                detail += '무카페인 청정 모드 💪';
            } else if (caffeine === 1) {
                score += 10;
                detail += '적절한 카페인 ☕';
            } else if (caffeine === 2) {
                score += 5;
                detail += '적당한 수준 ☕';
            } else if (caffeine <= 4) {
                score -= 10;
                detail += '카페인으로 연명중 ☕☕';
            } else {
                score -= 30;
                detail += '카페인 과다 위험 ⚠️☕';
            }

            if (score >= 30) {
                emoji = '😊';
                message = '최상의 컨디션!';
            } else if (score >= 10) {
                emoji = '😐';
                message = '그럭저럭 괜찮음';
            } else if (score >= -10) {
                emoji = '😩';
                message = '위험 수준';
            } else {
                emoji = '💀';
                message = '생존 위기';
            }

            conditionScore = score;
            updateDashboard();

            const result = document.getElementById('conditionResult');
            result.innerHTML = `
                <div class="result-section">
                    <div class="condition-result">
                        <div class="condition-emoji">${emoji}</div>
                        <div class="condition-message">${message}</div>
                        <div class="condition-detail">${detail}</div>
                        <p style="margin-top: 20px; font-size: 1.2rem; color: ${score >= 0 ? '#22c55e' : '#ef4444'}">
                            생존 보정치: ${score >= 0 ? '+' : ''}${score}%
                        </p>
                    </div>
                </div>
            `;
        }

        function updateDashboard() {
            let examPressure = 0;
            exams.forEach(exam => {
                const dday = getDday(exam.date);
                if (dday <= 3) examPressure += 35;
                else if (dday <= 7) examPressure += 20;
                else if (dday <= 14) examPressure += 10;
            });
            examPressure = Math.min(100, examPressure);

            let taskPressure = 0;
            tasks.forEach(task => {
                const dday = getDday(task.deadline);
                const diffMultiplier = { easy: 1, normal: 1.5, hard: 2.5 }[task.difficulty];
                if (dday <= 2) taskPressure += 35 * diffMultiplier;
                else if (dday <= 5) taskPressure += 18 * diffMultiplier;
                else if (dday <= 10) taskPressure += 10 * diffMultiplier;
            });
            taskPressure = Math.min(100, taskPressure);

            const survival = Math.max(0, Math.min(100, 100 - (examPressure * 0.45 + taskPressure * 0.45) + conditionScore * 0.5));

            const scoreDisplay = document.getElementById('survivalScore');
            scoreDisplay.textContent = Math.round(survival) + '%';
            scoreDisplay.className = 'score-display ' + 
                (survival >= 70 ? 'score-green' : survival >= 40 ? 'score-yellow' : 'score-red');

            document.getElementById('examPressure').textContent = 
                examPressure >= 50 ? '높음 🔴' : examPressure >= 25 ? '중간 🟡' : '낮음 🟢';
            
            document.getElementById('taskPressure').textContent = 
                taskPressure >= 50 ? '높음 🔴' : taskPressure >= 25 ? '중간 🟡' : '낮음 🟢';
            
            document.getElementById('conditionStatus').textContent = 
                conditionScore >= 25 ? '최고 😊' : conditionScore >= 5 ? '양호 😐' : 
                conditionScore >= -15 ? '나쁨 😩' : '위험 💀';
        }

        updateDashboard();
    </script>
</body>
</html>
